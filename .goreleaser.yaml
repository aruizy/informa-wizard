version: 2

project_name: informa-wizard

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/informa-wizard
    binary: informa-wizard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Gentleman-Programming
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: informa-wizard
    homepage: "https://github.com/Gentleman-Programming/informa-wizard"
    description: "Informa Wizard — One command to configure any AI coding agent on any OS."
    license: "MIT"
    commit_msg_template: "chore: update informa-wizard formula to {{ .Tag }}"

scoops:
  - repository:
      owner: Gentleman-Programming
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: informa-wizard
    homepage: "https://github.com/Gentleman-Programming/informa-wizard"
    description: "Informa Wizard — One command to configure any AI coding agent on any OS."
    license: MIT
    commit_msg_template: "chore: update informa-wizard to {{ .Tag }}"
